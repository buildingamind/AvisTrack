# ──────────────────────────────────────────────────────────────
#  AvisTrack Config — Wave2_Collective
#  Generated by: tools/init_config.py
# ──────────────────────────────────────────────────────────────

experiment: "Wave2_Collective"

# ── Drive / NAS paths ──────────────────────────────────────────
# '{root}' = experiment root; resolved automatically at load time.
drive:
  root:           "/media/woodlab/104-A/Wave2"
  raw_videos:     "{root}/00_raw_videos"
  dataset:        "{root}/01_Dataset_MOT_Format"
  metadata:       "{root}/02_Global_Metadata"
  roi_file:       "{root}/02_Global_Metadata/camera_rois.json"
  exclusions:     "{root}/02_Global_Metadata/exclusions.json"
  ocr_roi:        "{root}/02_Global_Metadata/ocr_roi.json"
  time_calibration: "{root}/02_Global_Metadata/time_calibration.json"
  train_manifest: "{root}/02_Global_Metadata/train_data_manifest.txt"
  val_manifest:   "{root}/02_Global_Metadata/val_tuning_manifest.txt"
  test_manifest:  "{root}/02_Global_Metadata/test_golden_manifest.txt"

# ── Chamber parameters ─────────────────────────────────────────
chamber:
  n_subjects:  9
  fps:         30
  target_size: [640, 640]

# ── Model ──────────────────────────────────────────────────────
model:
  backend: "yolo"
  mode:    "offline"
  weights: null  # not yet trained

# ── Tracking ───────────────────────────────────────────────────
tracking:
  conf_threshold: 0.2
  max_gap_frames: 30

# ── Pipeline ───────────────────────────────────────────────────
pipeline:
  - step: transform
  - step: track

# ── Output ─────────────────────────────────────────────────────
output:
  format: "parquet"
  dir:    "./outputs"

# ── Time calibration ──────────────────────────────────────────
time:
  timezone:    "America/New_York"
  time_format: "auto"

