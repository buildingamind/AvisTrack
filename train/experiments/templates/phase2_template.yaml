# =============================================================
#  Phase 2 template (workspace-aware, Step E schema)
#
#  Goal: training strategy scan — compare scratch vs. fine-tune,
#        and W2-only vs. combined dataset.
#
#  Per-run `model` field can be:
#    * 'yolo11s.pt'                            — ultralytics registry name
#    * 'phase1/yolo11s/weights/best.pt'        — relative to current
#                                                 experiment_name's models dir
#    * absolute path                           — pre-trained external weights
#
#  Per-run `data` field can override the global dataset for that run
#  (e.g. combined_finetune below uses a different dataset than the
#  default `dataset_name`). Path is treated as ultralytics-compatible.
# =============================================================

chamber_type:    collective
workspace_yaml:  "{workspace_root}/collective/workspace.yaml"
experiment_name: W2_collective_phase1     # SAME experiment as phase1 — meta.json shared
dataset_name:    full_v1                  # default dataset for runs that don't override
phase:           2

defaults:
  epochs:   100
  imgsz:    640
  batch:    16
  patience: 20
  device:   0
  workers:  0
  exist_ok: true
  verbose:  false

runs:
  # ── Baseline: train from COCO weights on the default dataset ───────────
  - name:  w2_scratch
    model: yolo11s.pt          # phase 1 winner placeholder; pipeline patches at runtime

  # ── Transfer from external W3 model: full fine-tune ────────────────────
  # (Replace this with your actual external best.pt or comment out.)
  # - name:  w3_finetune_full
  #   model: /external/yolo11n_w3_best.pt
  #   lr0:   0.001

  # ── Transfer from external W3 model: backbone frozen ───────────────────
  # - name:   w3_finetune_freeze
  #   model:  /external/yolo11n_w3_best.pt
  #   lr0:    0.001
  #   freeze: 10

  # ── Combined dataset, scratch ──────────────────────────────────────────
  # - name:  combined_scratch
  #   model: yolo11s.pt
  #   # Per-run dataset override (point at a separate workspace dataset that
  #   # was built from a recipe that mixes waves / chambers).
  #   data:  "{workspace_root}/collective/datasets/combined_v1/data.yaml"
